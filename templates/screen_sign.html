<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InkFlow — Live Sign Display</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Tajawal:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root { --accent:#c84b31; --gold:#d4a853; }
    html, body { width:100%; height:100%; font-family:'Cinzel',serif; overflow:hidden; background:#08080f; }

    .bg {
      position:fixed; inset:0; z-index:0;
      background: url('/static/images/bg_sign.jpg') center/cover no-repeat;
    }
    .bg::after { content:''; position:absolute; inset:0; background:rgba(0,0,0,0.48); }

    /* Scanlines */
    .scanlines {
      position:fixed; inset:0; z-index:1; pointer-events:none;
      background: repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.03) 3px,rgba(0,0,0,0.03) 4px);
    }

    .shell { position:fixed; inset:0; z-index:10; display:flex; flex-direction:column; }

    /* TOP BAR */
    .topbar {
      flex-shrink:0;
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 24px;
      background:rgba(5,5,15,0.72); backdrop-filter:blur(18px);
      border-bottom:1px solid rgba(255,255,255,0.07);
    }
    .brand { display:flex; align-items:center; gap:14px; }
    .live-pill {
      display:flex; align-items:center; gap:7px;
      background:rgba(74,222,128,0.1); border:1px solid rgba(74,222,128,0.22);
      border-radius:100px; padding:6px 14px;
    }
    .lp-dot { width:7px; height:7px; border-radius:50%; background:#4ade80; box-shadow:0 0 10px #4ade80; animation:blink 1.2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    .lp-txt { font-size:11px; color:#4ade80; font-weight:600; letter-spacing:2.5px; }
    .brand-name { font-size:19px; font-weight:600; color:white; letter-spacing:3px; }
    .brand-sub { font-size:9px; color:rgba(255,255,255,0.3); letter-spacing:2px; font-family:'Tajawal',sans-serif; }

    .top-right { display:flex; align-items:center; gap:20px; }
    .stroke-ctr { text-align:center; }
    .ctr-n { font-size:24px; font-weight:700; color:var(--gold); line-height:1; }
    .ctr-l { font-size:9px; color:rgba(255,255,255,0.3); letter-spacing:2px; font-family:'Tajawal',sans-serif; }
    .back-btn {
      display:flex; align-items:center; gap:7px; padding:8px 16px;
      border-radius:8px; border:1px solid rgba(255,255,255,0.1);
      background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.55);
      text-decoration:none; font-size:11px; letter-spacing:1.5px;
      transition:all 0.2s;
    }
    .back-btn:hover { color:white; border-color:rgba(255,255,255,0.3); }
    .back-btn svg { width:13px; height:13px; }

    /* VIEW AREA */
    .view-area { flex:1; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; padding:28px 40px; }

    /* Decorative corners */
    .corner { position:absolute; width:26px; height:26px; border-color:rgba(200,75,49,0.5); border-style:solid; z-index:5; }
    .c-tl { top:16px; right:16px; border-width:2px 0 0 2px; }
    .c-tr { top:16px; left:16px;  border-width:2px 2px 0 0; }
    .c-bl { bottom:16px; right:16px; border-width:0 0 2px 2px; }
    .c-br { bottom:16px; left:16px;  border-width:0 2px 2px 0; }

    .canvas-frame {
      position:relative;
      width:100%; max-width:1100px;
      height:100%;
      border-radius:6px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.08),
                  0 0 80px rgba(200,75,49,0.06),
                  0 24px 80px rgba(0,0,0,0.6);
      overflow:hidden;
    }

    /* Paper look for the canvas */
    .canvas-frame::before {
      content:''; position:absolute; inset:0;
      background:#f4f0e6; z-index:0;
    }
    .canvas-frame::after {
      content:''; position:absolute; inset:0;
      background: repeating-linear-gradient(0deg,transparent,transparent 55px,rgba(180,160,130,0.2) 55px,rgba(180,160,130,0.2) 56px);
      z-index:1; pointer-events:none;
    }
    .canvas-margin {
      position:absolute; top:0; bottom:0; left:80px;
      width:1px; background:rgba(200,80,60,0.3);
      z-index:2; pointer-events:none;
    }

    #canvas { position:relative; z-index:3; display:block; width:100%; height:100%; background:transparent; }

    /* Writing indicator */
    .writing-badge {
      position:absolute; bottom:22px; left:50%; transform:translateX(-50%);
      display:flex; align-items:center; gap:9px;
      background:rgba(5,5,15,0.8); backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:100px; padding:9px 20px;
      opacity:0; transition:opacity 0.3s; z-index:10;
    }
    .writing-badge.show { opacity:1; }
    .wb-txt { font-size:11px; color:rgba(255,255,255,0.5); letter-spacing:2px; font-family:'Tajawal',sans-serif; }
    .wb-dots span {
      display:inline-block; width:4px; height:4px; border-radius:50%;
      background:var(--accent); margin:0 2px;
      animation:db 1.2s ease infinite;
    }
    .wb-dots span:nth-child(2){animation-delay:.2s} .wb-dots span:nth-child(3){animation-delay:.4s}
    @keyframes db { 0%,100%{transform:translateY(0);opacity:.4} 50%{transform:translateY(-5px);opacity:1} }

    .clear-flash { position:absolute; inset:0; background:rgba(255,255,255,0.2); opacity:0; pointer-events:none; z-index:20; }
    @keyframes fo { 0%{opacity:1} 100%{opacity:0} }
    .clear-flash.flash { animation:fo .4s ease forwards; }

    /* STATUS */
    .statusbar {
      flex-shrink:0; display:flex; align-items:center; justify-content:center; gap:30px;
      padding:9px 24px;
      background:rgba(0,0,0,0.5); backdrop-filter:blur(12px);
      border-top:1px solid rgba(255,255,255,0.04);
    }
    .st-item { display:flex; align-items:center; gap:7px; font-size:10px; color:rgba(255,255,255,0.25); letter-spacing:2px; font-family:'Tajawal',sans-serif; }
    .st-item svg { width:12px; height:12px; opacity:.5; }
  </style>
</head>
<body>
<div class="bg"></div>
<div class="scanlines"></div>

<div class="shell">
  <div class="topbar">
    <div class="brand">
      <div class="live-pill"><div class="lp-dot"></div><span class="lp-txt">LIVE</span></div>
      <div>
        <div class="brand-name">SIGNATURE</div>
        <div class="brand-sub">LIVE DISPLAY</div>
      </div>
    </div>
    <div class="top-right">
      <div class="stroke-ctr">
        <div class="ctr-n" id="strokeCount">0</div>
        <div class="ctr-l">STROKES</div>
      </div>
      <a href="/" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        HOME
      </a>
    </div>
  </div>

  <div class="view-area">
    <div class="corner c-tl"></div><div class="corner c-tr"></div>
    <div class="corner c-bl"></div><div class="corner c-br"></div>

    <div class="canvas-frame">
      <div class="canvas-margin"></div>
      <canvas id="canvas"></canvas>
      <div class="clear-flash" id="clearFlash"></div>
      <div class="writing-badge" id="wb">
        <span class="wb-txt">SIGNING</span>
        <div class="wb-dots"><span></span><span></span><span></span></div>
      </div>
    </div>
  </div>

  <div class="statusbar">
    <div class="st-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      REAL-TIME UPDATE
    </div>
    <div class="st-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      VIEW ONLY MODE
    </div>
  </div>
</div>

<script>
const socket = io();
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let sc=0, wt=null;

function resize() {
  const f=canvas.parentElement, dpr=window.devicePixelRatio||1;
  const w=f.clientWidth, h=f.clientHeight;
  canvas.width=w*dpr; canvas.height=h*dpr;
  canvas.style.width=w+'px'; canvas.style.height=h+'px';
  ctx.scale(dpr,dpr);
}
window.addEventListener('resize',resize); resize();

function showW() {
  const b=document.getElementById('wb'); b.classList.add('show');
  clearTimeout(wt); wt=setTimeout(()=>b.classList.remove('show'),1500);
}

socket.on('stroke',d=>{
  if(d.type!=='sign') return;
  const w=canvas.clientWidth,h=canvas.clientHeight;
  ctx.globalAlpha=d.opacity; ctx.strokeStyle=d.color;
  ctx.lineWidth=d.size; ctx.lineCap=ctx.lineJoin='round';
  ctx.beginPath(); ctx.moveTo(d.nx0*w,d.ny0*h); ctx.lineTo(d.nx1*w,d.ny1*h); ctx.stroke();
  sc++; document.getElementById('strokeCount').textContent=sc;
  showW();
});

socket.on('clear',d=>{
  if(d?.type!=='sign') return;
  const dpr=window.devicePixelRatio||1;
  ctx.clearRect(0,0,canvas.width/dpr,canvas.height/dpr);
  sc=0; document.getElementById('strokeCount').textContent='0';
  const f=document.getElementById('clearFlash');
  f.classList.remove('flash'); void f.offsetWidth; f.classList.add('flash');
});
</script>
</body>
</html>
